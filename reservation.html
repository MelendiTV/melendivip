<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Reservation</title>

<style>

body{
background:#07070b;
font-family:Arial, sans-serif;
color:white;
margin:0;
padding:40px;
}

.reservation-box{
max-width:600px;
margin:auto;
background:#0f0f15;
padding:30px;
border-radius:15px;
border:2px solid #d4af37;
}

h1{
text-align:center;
color:#d4af37;
}

input, select, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #444;
background:#1a1a1f;
color:white;
}

button{
width:100%;
padding:16px;
background:linear-gradient(135deg,#d4af37,#b8962e);
border:none;
border-radius:14px;
font-weight:bold;
font-size:17px;
cursor:pointer;
color:#111;
box-shadow:0 0 12px rgba(212,175,55,.5);
animation:vipGlow 2s infinite;
}

@keyframes vipGlow{

0%{
transform:scale(1);
box-shadow:0 0 10px rgba(212,175,55,.5);
}

50%{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,215,0,.9);
}

100%{
transform:scale(1);
box-shadow:0 0 10px rgba(212,175,55,.5);
}

}

<style>
.reservation-success{
display:none;
margin-top:20px;
padding:16px;
border-radius:12px;
background:rgba(212,175,55,.15);
border:1px solid rgba(212,175,55,.6);
color:white;
text-align:center;
box-shadow:0 0 12px rgba(212,175,55,.3);
}

.reservation-success.show{
display:block;
animation:fadeIn .4s ease;
}

@keyframes fadeIn{
0%{opacity:0; transform:translateY(10px);}
100%{opacity:1; transform:translateY(0);}
}
  
</style>
</head>

<body>

<div class="reservation-box">

<h1>VIP Reservation</h1>

<form>

<input type="text" placeholder="Full Name" required>

<input type="tel" placeholder="Phone / WhatsApp"required>

<input type="date" required>

<input type="number" placeholder="Number of guests" requered>

<select>
<option>Select Club</option>
<option>CrazyHorse</option>
<option>Sapphire</option>
<option>Honeys</option>
<option>DiamondCabaret</option>
<option>PeppermintHippo</option>
<option>Scores</option>
<option>treasures</option>
</select>

<textarea placeholder="Extra details"></textarea>

<button>Send Reservation</button>
<div id="reservation-success" class="reservation-success">
  <strong>Reservation sent / Reserva enviada</strong><br>
  Your VIP host will contact you shortly.<br>
  Tu host se pondrá en contacto contigo en breve.
</div>
</form>
<script>

document.querySelector("form").addEventListener("submit", function(e){

e.preventDefault();

const name = document.querySelector('input[placeholder="Full Name"]').value
const phone = document.querySelector('input[placeholder="Phone / WhatsApp"]').value
const date = document.querySelector('input[type="date"]').value
const guests = document.querySelector('input[type="number"]').value
const club = document.querySelector("select").value
const details = document.querySelector("textarea").value

const whatsappNumber = "17025424935";

const message =
`VIP Reservation / Reserva VIP

Name / Nombre: ${name}
Phone / WhatsApp: ${phone}
Date / Fecha: ${date}
Guests / Invitados: ${guests}
Club: ${club}
Details / Detalles: ${details}`;



document.getElementById("reservation-success").classList.add("show");

const url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");
document.querySelector("form").reset();
});

</script>
</div>

</body>

</html>
