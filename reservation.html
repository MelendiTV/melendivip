<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Reservation</title>

<style>

body{
background:#07070b;
font-family:Arial, sans-serif;
color:white;
margin:0;
padding:40px;
}

.reservation-box{
max-width:600px;
margin:auto;
background:#0f0f15;
padding:30px;
border-radius:15px;
border:2px solid #d4af37;
}

h1{
text-align:center;
color:#d4af37;
}

input, select, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #444;
background:#1a1a1f;
color:white;
}

button{
width:100%;
padding:14px;
background:#d4af37;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="reservation-box">

<h1>VIP Reservation</h1>

<form>

<input type="text" placeholder="Full Name">

<input type="tel" placeholder="Phone / WhatsApp">

<input type="date">

<input type="number" placeholder="Number of guests">

<select>
<option>Select Club</option>
<option>Crazy Horse</option>
<option>Sapphire</option>
<option>Honeys</option>
<option>Diamond Cabaret</option>
<option>Peppermint Hippo</option>
<option>Scores</option>
<option>Treasures</option>
</select>

<textarea placeholder="Extra details"></textarea>

<button>Send Reservation</button>

</form>

</div>

</body>

</html>
